<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="Sericia">
  <!-- Minimal wordmark-initial mark. Project rule: brand assets MUST be
       kanji-free. Mark is the elegant "S" serif initial on an ink-hairline
       square frame — reads as a seal silhouette without leaning on
       Japanese typography. -->
  <rect x="8" y="8" width="64" height="64" fill="none" stroke="#21231d" stroke-width="1.2"/>
  <text
    x="40" y="54"
    text-anchor="middle"
    font-family="Cormorant Garamond, Didot, 'Playfair Display', Georgia, serif"
    font-style="italic"
    font-weight="500"
    font-size="44"
    fill="#21231d"
    letter-spacing="0.02em"
  >S</text>
</svg>
