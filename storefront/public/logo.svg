<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" role="img" aria-label="Sericia — craft food, rescued">
  <!-- Pure wordmark. Project rule: brand assets MUST be kanji-free.
       Identity rests on the SERICIA wordmark alone, in the spirit of
       Aesop / Le Labo / Lafco typographic logos. -->
  <style>
    .wordmark { font-family: "Cormorant Garamond", "Didot", "Playfair Display", Georgia, serif; font-weight: 500; fill: #1a1a1a; letter-spacing: 0.22em; }
    .tagline { font-family: "Inter", "Helvetica Neue", system-ui, sans-serif; font-size: 11px; letter-spacing: 0.32em; fill: #8b5a2b; text-transform: uppercase; }
    .hairline { fill: none; stroke: #1a1a1a; stroke-width: 0.7; opacity: 0.6; }
  </style>
  <text class="wordmark" x="240" y="64" text-anchor="middle" font-size="54">SERICIA</text>
  <line class="hairline" x1="90" y1="82" x2="390" y2="82" />
  <text class="tagline" x="240" y="102" text-anchor="middle">Craft food, rescued</text>
</svg>
