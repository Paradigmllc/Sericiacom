<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Sericia — Rescued Japanese Craft Food">
  <!-- OG card. Project rule: brand assets MUST be kanji-free. Card relies
       on pure wordmark + editorial copy in the Aesop / Le Labo tradition:
       paper background, hairline rule, serif wordmark, sans tagline,
       editorial body. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5efe6"/>
      <stop offset="1" stop-color="#e8dcc4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle botanical washes, purely decorative (no kanji, no brand marks) -->
  <g opacity="0.05">
    <circle cx="1050" cy="120" r="220" fill="#8b5a2b"/>
    <circle cx="150" cy="530" r="260" fill="#6b8e4e"/>
  </g>

  <!-- Top eyebrow -->
  <text x="90" y="110" font-family="Inter, sans-serif" font-size="18" letter-spacing="8" fill="#8b5a2b" text-transform="uppercase">Quietly, from Kyoto</text>

  <!-- Wordmark -->
  <text x="90" y="240" font-family="Cormorant Garamond, Didot, serif" font-weight="500" font-size="120" letter-spacing="18" fill="#1a1a1a">SERICIA</text>

  <!-- Hairline rule -->
  <line x1="90" y1="290" x2="1110" y2="290" stroke="#1a1a1a" stroke-width="1" opacity="0.25"/>

  <!-- Editorial body -->
  <text x="90" y="360" font-family="Cormorant Garamond, serif" font-weight="500" font-size="46" fill="#1a1a1a">Drop-by-drop limited releases of rescued</text>
  <text x="90" y="410" font-family="Cormorant Garamond, serif" font-weight="500" font-size="46" fill="#1a1a1a">Japanese craft food.</text>
  <text x="90" y="470" font-family="Inter, sans-serif" font-size="22" fill="#555" letter-spacing="2">Single-origin sencha · barrel-aged miso · hand-dried shiitake</text>
  <text x="90" y="500" font-family="Inter, sans-serif" font-size="22" fill="#555" letter-spacing="2">Shipped from Kyoto to 23+ countries via EMS</text>

  <!-- Footer mark -->
  <text x="90" y="580" font-family="Inter, sans-serif" font-size="15" letter-spacing="6" fill="#8b5a2b" text-transform="uppercase">Sericia.com</text>
</svg>
